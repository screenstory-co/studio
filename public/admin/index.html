<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS — Screenstory Studio</title>
  <style>html,body,#nc-root{margin:0;padding:0;width:100%;height:100%;font-family:system-ui,-apple-system,sans-serif;}</style>
</head>
<body>
  <div id="nc-root"></div>

  <script src="https://unpkg.com/decap-cms@3.5.0/dist/decap-cms.js"></script>
  <script>
    window.addEventListener('load', function() {
      var p = new URLSearchParams(location.search);
      var site = p.get('site');
      if (!site) { location.href = '/'; return; }
      document.getElementById('nc-root').innerHTML = '';
      fetch('/api/config?site=' + encodeURIComponent(site))
        .then(function(r){ if(!r.ok) return r.text().then(function(t){throw new Error(t)}); return r.json(); })
        .then(function(cfg){ window.CMS.init({ config: cfg }); })
        .catch(function(e){
          document.body.innerHTML = '<div style="padding:2rem;font-family:sans-serif"><h2>CMS Error</h2><pre>' + (e.message||e) + '</pre></div>';
        });
    });
  </script>
</body>
</html>
