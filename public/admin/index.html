<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS — Screenstory Studio</title>
  <style>html,body,#nc-root{margin:0;padding:0;width:100%;height:100%;font-family:system-ui,-apple-system,sans-serif;}</style>
</head>
<body>
  <div id="nc-root"></div>
  <script>
    (function() {
      function go() {
        var p = new URLSearchParams(location.search);
        var site = p.get('site');
        if (!site) { location.href = '/'; return; }
        var s = document.createElement('script');
        s.src = 'https://unpkg.com/decap-cms@3.6.2/dist/decap-cms.js';
        s.onload = function() {
          fetch('/api/config?site=' + encodeURIComponent(site))
            .then(function(r){ if(!r.ok) return r.text().then(function(t){throw new Error(t)}); return r.json(); })
            .then(function(cfg){ window.CMS.init({ config: cfg }); })
            .catch(function(e){
              document.body.innerHTML = '<div style=padding:2rem;><h2>CMS Error</h2><pre>' + (e.message||e) + '</pre></div>';
            });
        };
        s.onerror = function(){ document.body.innerHTML = '<div style=padding:2rem;><h2>Failed to load CMS</h2></div>'; };
        document.head.appendChild(s);
      }
      if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', go); else go();
    })();
  </script>
</body>
</html>
